server:
  port: 8089
  tomcat:
    max-http-form-post-size: 10000MB
    max-swallow-size: 10000MB
  ssl:
    enabled: false

spring:
  datasource:
    url: jdbc:sqlite:chat.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    properties:
      hibernate:
        dialect: com.chat.p2p.config.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10000MB
      max-request-size: 10000MB

chat:
  discovery:
    port: 45678
  p2p:
    port: 9090
  transfer:
    streams: 8
    buffer-size: 2097152
    queue-size: 64
    min-file-size: 10485760
    read-threads: 0
  messages:
    ttl-days: 90
  files:
    ttl-days: 30
    max-total-size-mb: 5000

logging:
  level:
    root: INFO
    com.chat.p2p: DEBUG
    org.springframework.web: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/p2p-chat.log
    max-size: 10MB
    max-history: 30
